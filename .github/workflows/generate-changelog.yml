name: Generate changelog
run-name: Generate changelog

on:
  workflow_call:

jobs:
  compose_changelog:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build Changelog
        id: build_changelog
        uses: mikepenz/release-changelog-builder-action@v6
        with:
          configuration: '.github/.changelog-config.json'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update changelog in release
        id: update_release1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |

          # Extract repository owner and name.
          REPO_OWNER=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f1)
          REPO_NAME=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f2)

          # Get the tag name from the ref
          TAG_NAME="${GITHUB_REF#refs/tags/}"

          # Get the release ID for the current tag
          RELEASE_ID=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/releases/tags/${TAG_NAME}" \
            | jq -r '.id')

          if [ "$RELEASE_ID" = "null" ] || [ -z "$RELEASE_ID" ]; then
            echo "::error::Could not find release for tag ${TAG_NAME}"
            exit 1
          fi

          echo "Found release ID: ${RELEASE_ID} for tag: ${TAG_NAME}"

          # Create a JSON payload with the new release body content
          PAYLOAD=$(jq -n --arg body "${{ steps.build_changelog.outputs.changelog }}" '{body: $body}')

          # Update the release
          UPDATE_RESPONSE=$(curl -s -X PATCH -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/releases/${RELEASE_ID}")
