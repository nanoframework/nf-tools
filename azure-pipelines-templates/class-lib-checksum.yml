parameters:
  - name: usePreviewBuild
    type: boolean
    default: false

steps:

# Query NuGet for the latest published description and compare native checksum/version.
# Only runs on PR builds for libraries that have native support (NF_NATIVE_ASSEMBLY_CHECKSUM set).
- task: PowerShell@2
  condition: >-
    and(
      succeededOrFailed(),
      eq(variables['StartReleaseCandidate'], false),
      ne(variables['NF_NATIVE_ASSEMBLY_CHECKSUM'], ''),
      ne(variables['System.PullRequest.PullRequestId'], '')
    )
  displayName: Check native checksum against published NuGet
  name: CheckNativeChecksum
  inputs:
    targetType: 'inline'
    script: |

      $packageId = "$(nugetPackageName)"
      $usePreview = [System.Convert]::ToBoolean("${{ parameters.usePreviewBuild }}")
      $newChecksum = $env:NF_NATIVE_ASSEMBLY_CHECKSUM
      $newNativeVersion = $env:NF_ASSEMBLY_NATIVE_VERSION

      Write-Host "Checking NuGet package: $packageId"
      Write-Host "Build checksum    : $newChecksum"
      Write-Host "Build native ver  : $newNativeVersion"

      # Fetch the list of LISTED versions from the NuGet search service.
      $searchUrl = "https://azuresearch-usnc.nuget.org/query?q=packageid:$($packageId.ToLower())&prerelease=true&semVerLevel=2.0.0"
      try
      {
          $searchResponse = Invoke-RestMethod -Uri $searchUrl -Method Get -ErrorAction Stop
      }
      catch
      {
          Write-Host "##[warning]Could not query NuGet search for '$packageId'. Native declaration update is required before publishing."
          Write-Host "##vso[task.setvariable variable=CHECKSUM_MISMATCH]true"
          Write-Host "##vso[task.setvariable variable=PUBLISHED_NATIVE_VERSION]N/A"
          Write-Host "##vso[task.setvariable variable=PUBLISHED_CHECKSUM]N/A"
          exit 0
      }

      $package = $searchResponse.data | Where-Object { $_.id -ieq $packageId } | Select-Object -First 1

      if (-not $package -or -not $package.versions)
      {
          Write-Host "##[warning]Package '$packageId' not found on NuGet (new package or no listed versions). Native declaration update is required before publishing."
          Write-Host "##vso[task.setvariable variable=CHECKSUM_MISMATCH]true"
          Write-Host "##vso[task.setvariable variable=PUBLISHED_NATIVE_VERSION]N/A"
          Write-Host "##vso[task.setvariable variable=PUBLISHED_CHECKSUM]N/A"
          exit 0
      }

      $versions = $package.versions | ForEach-Object { $_.version }

      # Select comparison baseline by release channel.
      # Preview builds must compare against latest preview, not latest overall version.
      if ($usePreview)
      {
          $previewVersions = $versions | Where-Object { $_ -match '-' }
          Write-Host "Preview versions found: $($previewVersions.Count)"

          if (-not $previewVersions)
          {
              Write-Host "##[warning]No preview versions published yet. Native declaration update is required before preview publishing."
              Write-Host "##vso[task.setvariable variable=CHECKSUM_MISMATCH]true"
              Write-Host "##vso[task.setvariable variable=PUBLISHED_NATIVE_VERSION]N/A"
              Write-Host "##vso[task.setvariable variable=PUBLISHED_CHECKSUM]N/A"
              exit 0
          }

          $targetVersion = $previewVersions | Select-Object -Last 1
          Write-Host "Comparison channel: preview"
      }
      else
      {
          $stableVersions = $versions | Where-Object { $_ -notmatch '-' }
          Write-Host "Stable versions found : $($stableVersions.Count)"

          if (-not $stableVersions)
          {
              Write-Host "##[warning]No stable versions published yet. Native declaration update is required before stable publishing."
              Write-Host "##vso[task.setvariable variable=CHECKSUM_MISMATCH]true"
              Write-Host "##vso[task.setvariable variable=PUBLISHED_NATIVE_VERSION]N/A"
              Write-Host "##vso[task.setvariable variable=PUBLISHED_CHECKSUM]N/A"
              exit 0
          }

          $targetVersion = $stableVersions | Select-Object -Last 1
          Write-Host "Comparison channel: stable"
      }

      Write-Host "Comparing against published version: $targetVersion"

      # Fetch the .nuspec directly from the flat-container — guaranteed to exist for any listed version
      $nuspecUrl = "https://api.nuget.org/v3-flatcontainer/$($packageId.ToLower())/$targetVersion/$($packageId.ToLower()).nuspec"
      try
      {
          [xml]$nuspec = Invoke-RestMethod -Uri $nuspecUrl -Method Get -ErrorAction Stop
      }
      catch
      {
          Write-Host "Could not retrieve .nuspec for $packageId $targetVersion. Skipping."
          Write-Host "##vso[task.setvariable variable=CHECKSUM_MISMATCH]false"
          exit 0
      }

      $description = $nuspec.package.metadata.description

      # Parse native version and checksum from description
      # Expected format: "This package requires a target with <LibraryName> v1.4.0.0 (checksum 0x2D5CA905)"
      $descPattern = '\S+ v(\S+) \(checksum (0x[0-9A-Fa-f]+)\)'
      if ($description -match $descPattern)
      {
          $publishedNativeVersion = $Matches[1]
          $publishedChecksum      = $Matches[2]
          Write-Host "Published native ver : $publishedNativeVersion"
          Write-Host "Published checksum   : $publishedChecksum"
      }
      else
      {
          Write-Host "Description does not contain native version/checksum pattern. Package may not have native support. Skipping."
          Write-Host "##vso[task.setvariable variable=CHECKSUM_MISMATCH]false"
          exit 0
      }

      # Compare (case-insensitive for hex)
      $checksumMatch = $publishedChecksum -ieq $newChecksum
      $versionMatch  = $publishedNativeVersion -eq $newNativeVersion

      if ($checksumMatch -and $versionMatch)
      {
          Write-Host "Native checksum and version match. No update needed."
          Write-Host "##vso[task.setvariable variable=CHECKSUM_MISMATCH]false"
      }
      else
      {
          Write-Host "##[warning]Native checksum or version has changed!"
          Write-Host "##vso[task.setvariable variable=CHECKSUM_MISMATCH]true"
          Write-Host "##vso[task.setvariable variable=PUBLISHED_NATIVE_VERSION]$publishedNativeVersion"
          Write-Host "##vso[task.setvariable variable=PUBLISHED_CHECKSUM]$publishedChecksum"
      }

# Ensure stubs are always available when a mismatch is detected, regardless of whether
# earlier steps (e.g. unit tests) failed and prevented class-lib-stubs.yml from publishing.
- task: CopyFiles@1
  condition: >-
    and(
      not(canceled()),
      eq(variables['CHECKSUM_MISMATCH'], 'true')
    )
  continueOnError: true
  displayName: Collect stubs (checksum mismatch)
  inputs:
    sourceFolder: $(Build.SourcesDirectory)
    Contents: |
      **\Stubs\**\*.cpp
      **\Stubs\**\*.h
      **\Stubs\**\*.cmake
    TargetFolder: '$(Build.ArtifactStagingDirectory)/Stubs'
    flattenFolders: true

- task: PublishPipelineArtifact@1
  condition: >-
    and(
      not(canceled()),
      eq(variables['CHECKSUM_MISMATCH'], 'true')
    )
  continueOnError: true
  displayName: Publish stubs artifact (checksum mismatch)
  inputs:
    targetPath: '$(Build.ArtifactStagingDirectory)'
    artifactName: stubs
    artifactType: pipeline

# Create a GitHub issue in nanoframework/Home and comment on the PR when a mismatch is detected.
- task: PowerShell@2
  condition: >-
    and(
      not(canceled()),
      eq(variables['CHECKSUM_MISMATCH'], 'true')
    )
  displayName: Create native-update issue and PR comment
  env:
    GITHUB_TOKEN: $(GitHubToken)
  inputs:
    targetType: 'inline'
    script: |

      $packageName      = "$(nugetPackageName)"
      $newChecksum      = $env:NF_NATIVE_ASSEMBLY_CHECKSUM
      $newNativeVersion = $env:NF_ASSEMBLY_NATIVE_VERSION
      $pubChecksum      = $env:PUBLISHED_CHECKSUM
      $pubNativeVersion = $env:PUBLISHED_NATIVE_VERSION
      $prNumber         = $env:SYSTEM_PULLREQUEST_PULLREQUESTNUMBER
      $repoName         = $env:BUILD_REPOSITORY_NAME

      $prLink      = "[$repoName#$prNumber](https://github.com/$repoName/pull/$prNumber)"
      $orgUrl      = $env:SYSTEM_TEAMFOUNDATIONCOLLECTIONURI.TrimEnd('/')
      $artifactUrl = "$orgUrl/$env:SYSTEM_TEAMPROJECT/_build/results?buildId=$env:BUILD_BUILDID&view=artifacts&type=publishedArtifacts"
      # Direct zip download — works without auth for public ADO projects, or use the az CLI command below
      $stubsZipUrl = "$orgUrl/$env:SYSTEM_TEAMPROJECT/_apis/build/builds/$env:BUILD_BUILDID/artifacts?artifactName=stubs&api-version=7.1&`$format=zip"
      $azDlCmd     = "az pipelines runs artifact download --run-id $env:BUILD_BUILDID --artifact-name stubs --path ./stubs --org $orgUrl --project `"$env:SYSTEM_TEAMPROJECT`""
      $issueTitle  = "Update $packageName declaration"
      $homeRepo    = "nanoframework/Home"

      # Hidden HTML-comment markers embedded in issue/PR-comment bodies.
      # Used to locate and compare stored values so updates are applied only when something actually changed.
      $dataTag        = "<!-- nf-data: native-version=$newNativeVersion checksum=$newChecksum -->"
      $dataTagPattern = '<!-- nf-data: native-version=(\S+) checksum=(0x[0-9A-Fa-f]+) -->'
      $commentMarker  = "<!-- nf-checksum-mismatch-comment -->"

      # ── Issue body ──────────────────────────────────────────────────────────
      $issueBody = @(
          $dataTag,
          "",
          "## :wrench: Native Assembly Declaration Update Required",
          "",
          "The NuGet package ``$packageName`` was built with new native assembly values that differ from what is currently declared in [nf-interpreter](https://github.com/nanoframework/nf-interpreter).",
          "",
          "### Changed values",
          "",
          "| | Previously published | New (from $prLink) |",
          "|---|---|---|",
          "| Native version | ``$pubNativeVersion`` | ``$newNativeVersion`` |",
          "| Checksum | ``$pubChecksum`` | ``$newChecksum`` |",
          "",
          "### Stub files",
          "",
          "The updated stubs are available in the build artifacts — **do not regenerate them**.",
          "",
          "**Direct zip download:**",
          "",
          "$stubsZipUrl",
          "",
          "[Browse artifacts in Azure DevOps]($artifactUrl)",
          "",
          "The artifact contains the ``.cpp``, ``.h``, and ``.cmake`` files for ``$packageName``.",
          "",
          "---",
          "",
          "> Follow the Copilot instructions in this repository for the step-by-step process to merge the stubs into nf-interpreter.",
          ">",
          "> :warning: This issue was automatically created by the CI pipeline for $prLink."
      ) -join "`n"

      # ── Handle GitHub Issue ─────────────────────────────────────────────────
      $existingIssues = gh issue list `
          --repo $homeRepo `
          --state open `
          --search "$issueTitle in:title" `
          --json number,url,body `
          --limit 5 | ConvertFrom-Json

      $existingIssue = $existingIssues | Where-Object { $_.url -ne $null } | Select-Object -First 1

      if ($existingIssue)
      {
          $issueUrl    = $existingIssue.url
          $issueNumber = $existingIssue.number

          if ($existingIssue.body -match $dataTagPattern)
          {
              $storedNativeVersion = $Matches[1]
              $storedChecksum      = $Matches[2]

              if (($storedChecksum -ieq $newChecksum) -and ($storedNativeVersion -eq $newNativeVersion))
              {
                  Write-Host "Open issue exists with matching values — refreshing artifact URL: $issueUrl"
              }
              else
              {
                  Write-Host "Open issue exists with changed values — updating: $issueUrl"
              }
          }
          else
          {
              Write-Host "Open issue exists without value marker — updating: $issueUrl"
          }

          gh issue edit $issueNumber --repo $homeRepo --body "$issueBody"
          Write-Host "Issue updated."
      }
      else
      {
          $issueUrl = gh issue create `
              --repo $homeRepo `
              --title "$issueTitle" `
              --label "Type: Chores" `
              --body "$issueBody" | Select-Object -Last 1

          Write-Host "Created issue: $issueUrl"
      }

      # Fetch all PR comments once — used by both branches below.
      $comments = gh api "/repos/$repoName/issues/$prNumber/comments?per_page=100" | ConvertFrom-Json

      # ── Branch on version bump condition ────────────────────────────────────
      # When the checksum changed but the native version was NOT bumped, the PR
      # is blocked: post only the version-bump comment and skip the usual mismatch
      # comment (which links the tracking issue) — that comes later, once the
      # version has been bumped.
      $versionBumpMarker  = "<!-- nf-version-bump-required -->"
      $versionBumpNeeded  = ($newChecksum -ine $pubChecksum) -and ($newNativeVersion -eq $pubNativeVersion)
      $existingBumpComment = $comments | Where-Object { $_.body -match [regex]::Escape($versionBumpMarker) } | Select-Object -First 1

      if ($versionBumpNeeded)
      {
          Write-Host "##[error]Checksum changed but native version was not bumped — posting version-bump comment and failing the build."

          $versionBumpBody = @(
              $versionBumpMarker,
              "",
              "## :stop_sign: Native version bump required",
              "",
              "The native assembly **checksum has changed** in this PR, but the **native version number was not bumped**.",
              "",
              "| | Previously published | This build |",
              "|---|---|---|",
              "| Native version | ``$pubNativeVersion`` | ``$newNativeVersion`` _(unchanged)_ |",
              "| Checksum | ``$pubChecksum`` | ``$newChecksum`` |",
              "",
              "Please update the native version in the managed assembly declaration to a new value that reflects this change."
          ) -join "`n"

          if ($existingBumpComment)
          {
              gh api --method PATCH "/repos/$repoName/issues/comments/$($existingBumpComment.id)" `
                  -f body="$versionBumpBody"
              Write-Host "Version-bump comment updated."
          }
          else
          {
              gh pr comment $prNumber --repo $repoName --body "$versionBumpBody"
              Write-Host "Version-bump comment posted."
          }

          Write-Host "##vso[task.logissue type=error]Native version must be bumped: checksum changed from $pubChecksum to $newChecksum but native version $newNativeVersion was not incremented."
          exit 1
      }
      else
      {
          # Version is correctly bumped (or only the version changed without a checksum change).
          # If a previous run posted a version-bump comment, strike through its text and add a thumbs-up.
          if ($existingBumpComment)
          {
              Write-Host "Version is now bumped — striking through version-bump comment and adding thumbs-up reaction."

              # Replace the original comment body with a flat struck-through summary.
              # Per-line ~~ wrapping is NOT used because GitHub strikethrough silently
              # fails on headings (## ...), table rows (| ... |), and blank lines.
              # A plain paragraph is the only form that renders strikethrough reliably.
              $resolvedBody = @(
                  $versionBumpMarker,
                  "",
                  "~~:stop_sign: **Native version bump required** — now resolved.~~",
                  "",
                  "~~Checksum changed from ``$pubChecksum`` to ``$newChecksum``. Native version was not bumped (``$pubNativeVersion``) — this has since been corrected to ``$newNativeVersion``.~~"
              ) -join "`n"

              gh api --method PATCH "/repos/$repoName/issues/comments/$($existingBumpComment.id)" `
                  -f body="$resolvedBody" | Out-Null

              gh api --method POST "/repos/$repoName/issues/comments/$($existingBumpComment.id)/reactions" `
                  -f content="+1" | Out-Null

              Write-Host "Version-bump comment struck through and reaction added."
          }

          # ── Post / update the usual checksum-mismatch comment ───────────────
          $prCommentBody = @(
              $commentMarker,
              $dataTag,
              "",
              "## :warning: Native declaration update required!",
              "",
              "The checksum and/or native version of ``$packageName`` have changed. The native declaration in [nf-interpreter](https://github.com/nanoframework/nf-interpreter) **must be updated** before this package can be released.",
              "",
              "| | Previously published | This build |",
              "|---|---|---|",
              "| Native version | ``$pubNativeVersion`` | ``$newNativeVersion`` |",
              "| Checksum | ``$pubChecksum`` | ``$newChecksum`` |",
              "",
              ":point_right: **Tracking issue: $issueUrl**",
              "",
              "The issue contains a link to the stubs artifact from this build and instructions for GitHub Copilot to perform the update."
          ) -join "`n"

          $existingComment = $comments | Where-Object { $_.body -match [regex]::Escape($commentMarker) } | Select-Object -First 1

          if ($existingComment)
          {
              if ($existingComment.body -match $dataTagPattern)
              {
                  $storedNativeVersion = $Matches[1]
                  $storedChecksum      = $Matches[2]

                  if (($storedChecksum -ieq $newChecksum) -and ($storedNativeVersion -eq $newNativeVersion))
                  {
                      Write-Host "PR comment already up to date — skipping."
                  }
                  else
                  {
                      Write-Host "PR comment values have changed — updating comment $($existingComment.id)."
                      gh api --method PATCH "/repos/$repoName/issues/comments/$($existingComment.id)" `
                          -f body="$prCommentBody"
                      Write-Host "PR comment updated."
                  }
              }
              else
              {
                  Write-Host "Existing PR comment found without value marker — updating."
                  gh api --method PATCH "/repos/$repoName/issues/comments/$($existingComment.id)" `
                      -f body="$prCommentBody"
                  Write-Host "PR comment updated."
              }
          }
          else
          {
              gh pr comment $prNumber --repo $repoName --body "$prCommentBody"
              Write-Host "PR comment posted."
          }
      }
